services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: defect-mlflow
    ports:
      - "5050:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - ./mlflow-data:/mlflow
