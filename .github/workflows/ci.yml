name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pyyaml -r requirements.txt

      - name: Run linter
        run: |
          ruff check src tests

      - name: Run tests
        run: |
          PYTHONPATH=src pytest

      - name: Prepare Docker build model placeholder
        run: |
          mkdir -p models
          touch models/best_model.pth

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Validate Kubernetes manifests
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          paths = sorted(Path("k8s").rglob("*.yaml"))
          for path in paths:
              with path.open(encoding="utf-8") as stream:
                  docs = [doc for doc in yaml.safe_load_all(stream) if doc]
              if not docs:
                  raise SystemExit(f"{path}: no YAML documents found")
              for index, doc in enumerate(docs, start=1):
                  for key in ("apiVersion", "kind", "metadata"):
                      if key not in doc:
                          raise SystemExit(f"{path}#{index}: missing {key}")
                  if "name" not in doc["metadata"]:
                      raise SystemExit(
                          f"{path}#{index}: missing metadata.name"
                      )
          print(f"Validated {len(paths)} Kubernetes manifest files")
          PY

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Publish Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:main
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:main

      - name: Update Kubernetes image tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          deployment = Path("k8s/api/deployment.yaml")
          image = "ghcr.io/${{ github.repository }}:${{ github.sha }}"
          text = deployment.read_text(encoding="utf-8")
          updated = re.sub(
              r"image: ghcr\.io/${{ github.repository }}:[^\s]+",
              f"image: {image}",
              text,
          )
          if updated == text:
              raise SystemExit("Deployment image tag was not updated")
          deployment.write_text(updated, encoding="utf-8")
          PY

      - name: Create deployment manifest pull request
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "chore(cd): update api image tag"
          title: "chore(cd): update api image tag"
          body: |
            Updates the Kubernetes API deployment to the image built from
            `${{ github.sha }}`.

            Merge this PR to let Argo CD deploy the new immutable image tag.
          branch: chore/update-api-image-${{ github.sha }}
          delete-branch: true
          labels: |
            automated
            cd
