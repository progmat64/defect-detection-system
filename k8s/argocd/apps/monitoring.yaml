apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: defect-detection-monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/progmat64/defect-detection-system.git
    targetRevision: main
    path: k8s/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
