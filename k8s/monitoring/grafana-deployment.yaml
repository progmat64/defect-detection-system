apiVersion: apps/v1
kind: Deployment
metadata:
  name: defect-detection-grafana
  labels:
    app: defect-detection-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: defect-detection-grafana
  template:
    metadata:
      labels:
        app: defect-detection-grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
