apiVersion: apps/v1
kind: Deployment
metadata:
  name: defect-detection-prometheus
  labels:
    app: defect-detection-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: defect-detection-prometheus
  template:
    metadata:
      labels:
        app: defect-detection-prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.0.1
          imagePullPolicy: IfNotPresent
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: prometheus-config
          configMap:
            name: defect-detection-prometheus-config
